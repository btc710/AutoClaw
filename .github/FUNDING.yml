# AutoClaw funding stance
#
# AutoClaw does not currently accept sponsorships or donations.
# We are an early-alpha, MIT-licensed community project. We may revisit
# this once a maintainer team exists and there is a clear plan for how
# funds would be spent transparently.
#
# If you would like to support the project today:
#   - Contribute code, docs, or bug reports.
#   - Test AutoClaw on your car/head unit and share what you find
#     in GitHub Discussions.
#   - Tell other developers about the project.
#
# When (and if) we enable sponsorships, this file will be updated and
# announced in a Discussions post first.

